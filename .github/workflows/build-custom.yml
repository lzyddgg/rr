name: Build Custom RR Image (Patch Initrd)

on:
  workflow_dispatch:
    inputs:
      base_tag:
        description: "Base RR release tag"
        required: true
        default: "24.4.4"
      model:
        description: "Model label for output name"
        required: true
        default: "DS418play"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt update
          sudo apt install -y curl unzip xz-utils cpio dosfstools util-linux zip

      - name: Download base RR image
        run: |
          set -euxo pipefail
          TAG="${{ inputs.base_tag }}"
          curl -kL --connect-timeout 20 \
            "https://github.com/RROrg/rr/releases/download/${TAG}/rr-${TAG}.img.zip" \
            -o rr-base.zip
          unzip rr-base.zip -d rr
          test -f rr/rr.img

      - name: Patch initrd with current source
        run: |
          set -euxo pipefail
          WORK="$GITHUB_WORKSPACE"
          IMG="$WORK/rr/rr.img"

          LOOP="$(sudo losetup -f --show -P "$IMG")"
          echo "LOOP=$LOOP"

          mkdir -p /tmp/rr_p3
          sudo mount "${LOOP}p3" /tmp/rr_p3

          test -f /tmp/rr_p3/initrd-rr

          rm -rf "$WORK/initrd_unpack"
          mkdir -p "$WORK/initrd_unpack"
          (
            cd "$WORK/initrd_unpack"
            sudo xz -dc </tmp/rr_p3/initrd-rr | sudo cpio -idm
          )

          # 覆盖你仓库里的 rr 脚本与模型配置
          sudo cp -rf "$WORK/files/initrd/opt/rr/"* "$WORK/initrd_unpack/opt/rr/"

          # 重新打包 initrd
          (
            cd "$WORK/initrd_unpack"
            sudo find . 2>/dev/null | sudo cpio -o -H newc -R root:root | xz --check=crc32 > "$WORK/initrd-rr.new"
          )

          sudo cp -f "$WORK/initrd-rr.new" /tmp/rr_p3/initrd-rr
          sync

          sudo umount /tmp/rr_p3
          sudo losetup -d "$LOOP"

      - name: Package output
        run: |
          set -euxo pipefail
          OUT="rr-${{ inputs.model }}-${{ inputs.base_tag }}-custom.img.zip"
          zip -9 "$OUT" -j rr/rr.img
          sha256sum "$OUT" > "${OUT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rr-custom-${{ inputs.model }}-${{ inputs.base_tag }}
          path: |
            rr-${{ inputs.model }}-${{ inputs.base_tag }}-custom.img.zip
            rr-${{ inputs.model }}-${{ inputs.base_tag }}-custom.img.zip.sha256
          retention-days: 7
